<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmaGenius Pro - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter">💊 PHARMAGENIUS <span class="text-blue-400">PRO</span></h1>
        </div>
        <div class="flex gap-8 items-center">
            <button onclick="showTab('billing')" class="hover:text-yellow-400 font-bold transition text-sm">BILLING</button>
            <button onclick="showTab('inventory')" class="hover:text-yellow-400 font-bold transition text-sm">STOCK/EDIT</button>
            <div class="bg-blue-950 px-4 py-1 rounded-lg border border-blue-700 flex flex-col items-center">
                <span class="text-[10px] uppercase text-blue-300">Tablet PIN</span>
                <span id="pinDisplay" class="text-xl font-black text-yellow-400">----</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-7xl">
        
        <div id="billing" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <input type="text" id="billSearch" placeholder="Scan or Search Medicine..." 
                           class="w-full p-5 bg-slate-100 rounded-xl text-lg outline-none focus:ring-4 focus:ring-blue-500/20 mb-6"
                           onkeypress="handleBillSearch(event)">
                    
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-xs font-bold text-slate-500 uppercase">
                            <tr><th class="p-4">Item</th><th class="p-4">Exp</th><th class="p-4">Qty</th><th class="p-4">MRP</th><th class="p-4">Total</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="billItems" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-xl border border-blue-100 h-fit sticky top-24">
                    <h3 class="font-bold mb-6 text-slate-400 uppercase text-xs">Checkout Summary</h3>
                    <div class="flex justify-between mb-4 text-xl"><span>Subtotal:</span><span id="subTotal">₹0.00</span></div>
                    <div class="flex justify-between items-center mb-6">
                        <span>Disc (%):</span>
                        <input type="number" id="billDiscount" value="0" class="w-20 p-2 border rounded text-right font-bold" onchange="calcBill()">
                    </div>
                    <div class="flex p-1 bg-gray-100 rounded-xl mb-6">
                        <button onclick="setMode('CASH')" id="btnCash" class="flex-1 py-3 rounded-lg font-bold bg-white shadow">CASH</button>
                        <button onclick="setMode('UPI')" id="btnUpi" class="flex-1 py-3 rounded-lg font-bold text-slate-500">UPI</button>
                    </div>
                    <div class="text-center mb-8">
                        <span class="text-5xl font-black text-blue-700" id="grandTotal">₹0.00</span>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-700 active:scale-95 transition">
                        FINISH & SYNC
                    </button>
                </div>
            </div>
        </div>

        <div id="inventory" class="tab-content hidden space-y-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 id="formTitle" class="text-xl font-black mb-6 text-slate-800 uppercase tracking-tight">Add New Stock</h2>
                <form id="stockForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <input type="hidden" id="editIdx" value="-1">
                    <input type="text" id="invBarcode" placeholder="Barcode" class="p-3 border rounded-xl bg-slate-50" required>
                    <input type="text" id="invName" placeholder="Name" class="p-3 border rounded-xl" required>
                    <input type="date" id="invExpiry" class="p-3 border rounded-xl" required>
                    <input type="number" id="invQty" placeholder="Qty" class="p-3 border rounded-xl" required>
                    <input type="number" id="invSale" placeholder="MRP" class="p-3 border rounded-xl" required>
                    <button type="submit" id="saveBtn" class="bg-blue-600 text-white p-3 rounded-xl font-bold">SAVE</button>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-xs uppercase">
                        <tr><th class="p-4">Barcode</th><th class="p-4">Name</th><th class="p-4">Expiry</th><th class="p-4">Stock</th><th class="p-4">MRP</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="inventoryList" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ph_inv')) || [];
        let cart = [];
        let paymentMode = "CASH";
        let syncPin = localStorage.getItem('ph_pin') || Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('ph_pin', syncPin);

        const peer = new Peer('pharma-moranhat-' + syncPin);
        let tabletConn = null;

        peer.on('open', id => document.getElementById('pinDisplay').innerText = syncPin);
        peer.on('connection', conn => { tabletConn = conn; syncToTablet(); });

        function syncToTablet(finalize = false) {
            if (tabletConn && tabletConn.open) {
                tabletConn.send({ cart, total: document.getElementById('grandTotal').innerText, mode: paymentMode, finalize: finalize });
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'inventory') renderInventoryList();
        }

        // STOCK EDIT & SAVE LOGIC
        document.getElementById('stockForm').onsubmit = function(e) {
            e.preventDefault();
            const idx = parseInt(document.getElementById('editIdx').value);
            const newItem = {
                barcode: document.getElementById('invBarcode').value,
                name: document.getElementById('invName').value,
                expiry: document.getElementById('invExpiry').value,
                qty: parseInt(document.getElementById('invQty').value),
                sale: parseFloat(document.getElementById('invSale').value)
            };

            if(idx === -1) inventory.push(newItem);
            else inventory[idx] = newItem;

            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            this.reset();
            document.getElementById('editIdx').value = "-1";
            document.getElementById('formTitle').innerText = "Add New Stock";
            renderInventoryList();
            alert("Inventory Updated!");
        };

        function renderInventoryList() {
            document.getElementById('inventoryList').innerHTML = inventory.map((item, idx) => `
                <tr>
                    <td class="p-4 text-xs font-mono">${item.barcode}</td>
                    <td class="p-4 font-bold">${item.name}</td>
                    <td class="p-4 text-red-500">${item.expiry}</td>
                    <td class="p-4 font-bold">${item.qty}</td>
                    <td class="p-4 text-blue-600 font-bold">₹${item.sale}</td>
                    <td class="p-4"><button onclick="editItem(${idx})" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-xs font-bold">EDIT</button></td>
                </tr>
            `).join('');
        }

        function editItem(idx) {
            const item = inventory[idx];
            document.getElementById('invBarcode').value = item.barcode;
            document.getElementById('invName').value = item.name;
            document.getElementById('invExpiry').value = item.expiry;
            document.getElementById('invQty').value = item.qty;
            document.getElementById('invSale').value = item.sale;
            document.getElementById('editIdx').value = idx;
            document.getElementById('formTitle').innerText = "Editing: " + item.name;
            window.scrollTo(0,0);
        }

        // BILLING LOGIC (STAYED SAME AS PREVIOUS)
        function handleBillSearch(e) {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase();
                const prod = inventory.find(p => p.barcode === val || p.name.toLowerCase().includes(val));
                if(prod) { cart.push({...prod, cartQty: 1}); renderCart(); e.target.value = ''; }
            }
        }

        function renderCart() {
            document.getElementById('billItems').innerHTML = cart.map((item, idx) => `
                <tr>
                    <td class="p-4 font-bold">${item.name}</td>
                    <td class="p-4 text-xs">${item.expiry}</td>
                    <td class="p-4"><input type="number" value="${item.cartQty}" class="w-12 border rounded text-center" onchange="updateQty(${idx}, this.value)"></td>
                    <td class="p-4">₹${item.sale}</td>
                    <td class="p-4 font-black">₹${(item.sale * item.cartQty).toFixed(2)}</td>
                    <td class="p-4"><button onclick="removeItem(${idx})" class="text-red-400">✕</button></td>
                </tr>
            `).join('');
            calcBill();
        }

        function updateQty(idx, val) { cart[idx].cartQty = parseInt(val); renderCart(); }
        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }

        function calcBill() {
            let sub = cart.reduce((acc, i) => acc + (i.sale * i.cartQty), 0);
            let disc = parseFloat(document.getElementById('billDiscount').value) || 0;
            let grand = sub - (sub * (disc/100));
            document.getElementById('subTotal').innerText = `₹${sub.toFixed(2)}`;
            document.getElementById('grandTotal').innerText = `₹${grand.toFixed(2)}`;
            syncToTablet();
        }

        function setMode(mode) {
            paymentMode = mode;
            document.getElementById('btnCash').className = mode === 'CASH' ? 'flex-1 py-3 rounded-lg font-bold bg-white shadow' : 'flex-1 py-3 rounded-lg font-bold text-slate-500';
            document.getElementById('btnUpi').className = mode === 'UPI' ? 'flex-1 py-3 rounded-lg font-bold bg-white shadow' : 'flex-1 py-3 rounded-lg font-bold text-slate-500';
            syncToTablet();
        }

        function completeSale() {
            if(cart.length === 0) return;
            cart.forEach(c => {
                let item = inventory.find(i => i.barcode === c.barcode);
                if(item) item.qty -= c.cartQty;
            });
            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            syncToTablet(true); // "True" tells tablet to show WhatsApp button
            alert("Bill Finalized!");
            cart = []; renderCart();
        }
    </script>
</body>
</html>
