<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmaPro | Billing Hub</title>
    <style>
        :root { --blue: #1e3a8a; --green: #10b981; --gray: #f3f4f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--gray); height: 100vh; }
        
        /* Sidebar */
        nav { width: 250px; background: var(--blue); color: white; padding: 20px; flex-shrink: 0; }
        nav h2 { border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        
        /* Main Content */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-add { background: var(--blue); color: white; }
        .btn-pay { background: var(--green); color: white; margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; background: #f9fafb; padding: 10px; color: #6b7280; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .total-box { font-size: 1.5rem; font-weight: bold; text-align: right; margin-top: 15px; }
    </style>
</head>
<body>

<nav>
    <h2>💊 PharmaPro</h2>
    <p>v3.0 Permanent Site</p>
    <hr>
    <p>Step 1: Add Stock<br>Step 2: Scan to Bill<br>Step 3: Show Tablet</p>
</nav>

<main>
    <div class="grid">
        <div class="card">
            <h3>Inventory Entry</h3>
            <input type="text" id="pName" placeholder="Medicine Name">
            <input type="date" id="pExp" title="Expiry Date">
            <input type="number" id="pMrp" placeholder="MRP (Price)">
            <input type="number" id="pStock" placeholder="Current Stock Qty">
            <button class="btn btn-add" onclick="addStock()">Add to Inventory & Clear</button>
        </div>

        <div class="card">
            <h3>Quick Billing</h3>
            <input type="text" id="scanner" placeholder="Type name to sell..." oninput="searchAndSell()">
            <table>
                <thead><tr><th>Item</th><th>Expiry</th><th>Price</th></tr></thead>
                <tbody id="billList"></tbody>
            </table>
            <div class="total-box" id="grandTotal">Total: ₹0.00</div>
            <button class="btn btn-pay" onclick="syncWithTablet()">GENERATE TABLET LINK</button>
        </div>
    </div>

    <div id="syncModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; padding:50px; text-align:center;">
        <h1>Send to Tablet</h1>
        <p>Open this URL on your tablet browser:</p>
        <h2 id="tabletUrlDisplay" style="background:#333; padding:15px; word-break: break-all;"></h2>
        <button class="btn" style="width:200px; background:red;" onclick="document.getElementById('syncModal').style.display='none'">Close</button>
    </div>
</main>

<script>
    let stock = JSON.parse(localStorage.getItem('pharmaData')) || [];
    let bill = [];

    function addStock() {
        const item = {
            name: document.getElementById('pName').value,
            exp: document.getElementById('pExp').value,
            mrp: document.getElementById('pMrp').value,
            qty: document.getElementById('pStock').value
        };
        if(!item.name || !item.mrp) return alert("Fill Name and Price!");
        stock.push(item);
        localStorage.setItem('pharmaData', JSON.stringify(stock));
        document.querySelectorAll('input').forEach(i => i.value = "");
        alert("Stock Updated!");
    }

    function searchAndSell() {
        let val = document.getElementById('scanner').value.toLowerCase();
        let match = stock.find(s => s.name.toLowerCase() === val);
        if(match) {
            bill.push(match);
            renderBill();
            document.getElementById('scanner').value = "";
        }
    }

    function renderBill() {
        let total = 0;
        document.getElementById('billList').innerHTML = bill.map(item => {
            total += parseFloat(item.mrp);
            return `<tr><td>${item.name}</td><td>${item.exp}</td><td>₹${item.mrp}</td></tr>`;
        }).join('');
        document.getElementById('grandTotal').innerText = `Total: ₹${total.toFixed(2)}`;
    }

    function syncWithTablet() {
        let total = document.getElementById('grandTotal').innerText.split('₹')[1];
        // This builds the link for your Netlify site
        let baseUrl = window.location.href.replace('index.html', '').replace(/\/$/, "");
        let finalUrl = `${baseUrl}/tablet.html?total=${total}`;
        
        document.getElementById('syncModal').style.display = 'block';
        document.getElementById('tabletUrlDisplay').innerText = finalUrl;
    }
</script>
</body>
</html>
