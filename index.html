<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmaGenius - Official Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-xl no-print flex justify-between items-center">
        <h1 class="text-xl font-bold">💊 PHARMAGENIUS PRO</h1>
        <div class="flex gap-6 items-center">
            <button onclick="showTab('billing')" class="font-bold border-b-2 border-white">BILLING</button>
            <button onclick="showTab('inventory')" class="font-bold opacity-70 hover:opacity-100">STOCK ENTRY</button>
            <button onclick="showTab('reports')" class="font-bold opacity-70 hover:opacity-100">PROFIT/REPORTS</button>
            <div class="bg-blue-800 px-3 py-1 rounded border border-blue-400">
                <span class="text-[10px] block text-blue-200">TABLET PIN</span>
                <span id="pinDisplay" class="text-lg font-black text-yellow-400">----</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-7xl">
        
        <div id="billing" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border">
                    <input type="text" id="billSearch" placeholder="Scan Barcode or Type Medicine Name..." 
                           class="w-full p-4 bg-gray-100 rounded-lg mb-6 text-lg outline-none focus:ring-2 focus:ring-blue-500"
                           onkeypress="handleBillSearch(event)">
                    
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr><th class="p-3">Item</th><th class="p-3">Expiry</th><th class="p-3">Qty</th><th class="p-3">MRP</th><th class="p-3">Total</th><th class="p-3"></th></tr>
                        </thead>
                        <tbody id="billItems" class="divide-y"></tbody>
                    </table>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border h-fit">
                    <h3 class="font-bold mb-4 text-gray-400 uppercase text-xs">Checkout Summary</h3>
                    <div class="flex justify-between mb-2"><span>Subtotal:</span><span id="subTotal">₹0.00</span></div>
                    <div class="flex justify-between items-center mb-4">
                        <span>Discount (%):</span>
                        <input type="number" id="billDiscount" value="0" class="w-20 p-1 border rounded text-right" onchange="calcBill()">
                    </div>
                    <div class="flex p-1 bg-gray-100 rounded-lg mb-6">
                        <button onclick="setMode('CASH')" id="btnCash" class="flex-1 py-2 rounded font-bold bg-white shadow">CASH</button>
                        <button onclick="setMode('UPI')" id="btnUpi" class="flex-1 py-2 rounded font-bold text-gray-500">UPI</button>
                    </div>
                    <div class="flex justify-between text-3xl font-black text-blue-700 mb-6">
                        <span>Total:</span><span id="grandTotal">₹0.00</span>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700">PRINT & SAVE</button>
                </div>
            </div>
        </div>

        <div id="inventory" class="tab-content hidden bg-white p-8 rounded-xl shadow-sm border">
            <h2 class="text-xl font-bold mb-6">Add Stock (Manual or Scan)</h2>
            <form id="stockForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <input type="text" id="invBarcode" placeholder="Barcode" class="p-3 border rounded-lg bg-yellow-50" required>
                <input type="text" id="invName" placeholder="Medicine Name" class="p-3 border rounded-lg" required>
                <input type="month" id="invExpiry" class="p-3 border rounded-lg" required>
                <input type="number" id="invQty" placeholder="Quantity" class="p-3 border rounded-lg" required>
                <input type="number" id="invSale" placeholder="MRP (Sale Price)" class="p-3 border rounded-lg" required>
                <input type="number" id="invCost" placeholder="Cost Price (Optional)" class="p-3 border rounded-lg">
                <button type="submit" class="lg:col-span-4 bg-blue-900 text-white p-3 rounded-lg font-bold">SAVE TO DATABASE</button>
            </form>
        </div>

    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ph_inv')) || [];
        let sales = JSON.parse(localStorage.getItem('ph_sales')) || [];
        let cart = [];
        let paymentMode = "CASH";
        let syncPin = Math.floor(1000 + Math.random() * 9000);
        let peer = new Peer('pharma-moranhat-' + syncPin);
        let tabletConn = null;

        // Sync Logic
        peer.on('open', id => document.getElementById('pinDisplay').innerText = syncPin);
        peer.on('connection', conn => { 
            tabletConn = conn; 
            syncToTablet();
        });

        function syncToTablet() {
            if (tabletConn && tabletConn.open) {
                tabletConn.send({ cart, total: document.getElementById('grandTotal').innerText, mode: paymentMode });
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Add Stock Logic (NO RANDOM PRICES)
        document.getElementById('stockForm').onsubmit = function(e) {
            e.preventDefault();
            const newItem = {
                barcode: document.getElementById('invBarcode').value,
                name: document.getElementById('invName').value,
                expiry: document.getElementById('invExpiry').value,
                qty: parseInt(document.getElementById('invQty').value),
                sale: parseFloat(document.getElementById('invSale').value),
                cost: parseFloat(document.getElementById('invCost').value) || 0
            };
            inventory.push(newItem);
            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            alert("Medicine Added Successfully!");
            this.reset();
        };

        // Billing Logic
        function handleBillSearch(e) {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase();
                const prod = inventory.find(p => p.barcode === val || p.name.toLowerCase().includes(val));
                if(prod) {
                    cart.push({...prod, cartQty: 1});
                    renderCart();
                    e.target.value = '';
                } else {
                    alert("Medicine not found in stock!");
                }
            }
        }

        function renderCart() {
            const tbody = document.getElementById('billItems');
            tbody.innerHTML = cart.map((item, idx) => `
                <tr>
                    <td class="p-3 font-bold">${item.name}</td>
                    <td class="p-3 text-red-500 text-xs">${item.expiry}</td>
                    <td class="p-3"><input type="number" value="${item.cartQty}" class="w-12 border rounded text-center" onchange="updateQty(${idx}, this.value)"></td>
                    <td class="p-3">₹${item.sale}</td>
                    <td class="p-3 font-bold">₹${(item.sale * item.cartQty).toFixed(2)}</td>
                    <td class="p-3"><button onclick="removeItem(${idx})" class="text-red-400">✕</button></td>
                </tr>
            `).join('');
            calcBill();
        }

        function updateQty(idx, val) { cart[idx].cartQty = parseInt(val); renderCart(); }
        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }

        function calcBill() {
            let sub = cart.reduce((acc, i) => acc + (i.sale * i.cartQty), 0);
            let disc = parseFloat(document.getElementById('billDiscount').value) || 0;
            let grand = sub - (sub * (disc/100));
            document.getElementById('subTotal').innerText = `₹${sub.toFixed(2)}`;
            document.getElementById('grandTotal').innerText = `₹${grand.toFixed(2)}`;
            syncToTablet();
        }

        function setMode(mode) {
            paymentMode = mode;
            document.getElementById('btnCash').className = mode === 'CASH' ? 'flex-1 py-2 rounded font-bold bg-white shadow' : 'flex-1 py-2 rounded font-bold text-gray-500';
            document.getElementById('btnUpi').className = mode === 'UPI' ? 'flex-1 py-2 rounded font-bold bg-white shadow' : 'flex-1 py-2 rounded font-bold text-gray-500';
            syncToTablet();
        }

        function completeSale() {
            if(cart.length === 0) return;
            // Subtract stock
            cart.forEach(c => {
                let item = inventory.find(i => i.barcode === c.barcode);
                if(item) item.qty -= c.cartQty;
            });
            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            
            // Log Sale
            const total = parseFloat(document.getElementById('grandTotal').innerText.replace('₹',''));
            sales.push({ date: new Date().toLocaleDateString(), total, items: [...cart] });
            localStorage.setItem('ph_sales', JSON.stringify(sales));

            alert("Bill Finalized!");
            cart = []; renderCart();
        }
    </script>
</body>
</html>
