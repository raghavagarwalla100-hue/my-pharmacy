<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmaGenius Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter uppercase">💊 PHARMAGENIUS <span class="text-blue-400">PRO</span></h1>
        <div class="flex gap-6 items-center">
            <button onclick="showTab('billing')" class="hover:text-yellow-400 font-bold transition">BILLING</button>
            <button onclick="showTab('inventory')" class="hover:text-yellow-400 font-bold transition">STOCK</button>
            <div class="bg-blue-950 px-4 py-1 rounded-lg border border-blue-700 text-center min-w-[100px]">
                <span class="text-[10px] text-blue-300 block uppercase">Tablet PIN</span>
                <span id="pinDisplay" class="text-xl font-black text-yellow-400 leading-none">----</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-7xl">
        <div id="billing" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <input type="text" id="billSearch" placeholder="Scan Barcode or Type Medicine..." 
                               class="w-full p-4 bg-slate-100 rounded-xl text-lg outline-none focus:ring-4 focus:ring-blue-500/20 mb-4"
                               onkeypress="handleBillSearch(event)">
                        <table class="w-full text-left">
                            <thead class="text-xs font-bold text-slate-400 uppercase border-b">
                                <tr><th class="p-4">Item</th><th class="p-4 text-center">Qty</th><th class="p-4">MRP</th><th class="p-4">Total</th><th></th></tr>
                            </thead>
                            <tbody id="billItems" class="divide-y"></tbody>
                        </table>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-slate-800 uppercase tracking-tight text-sm">Today's Sales History</h3>
                            <div class="text-right">
                                <span class="text-[10px] font-bold text-slate-400 block uppercase">Total Revenue</span>
                                <span id="todayRev" class="text-2xl font-black text-green-600">₹0.00</span>
                            </div>
                        </div>
                        <div class="max-h-64 overflow-y-auto border rounded-xl">
                            <table class="w-full text-sm text-center">
                                <thead class="bg-slate-50 sticky top-0">
                                    <tr class="text-slate-500 font-bold border-b">
                                        <th class="p-3 text-left">Time</th><th class="p-3 text-left">Summary</th><th class="p-3">Amount</th><th class="p-3">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="salesHistoryList" class="divide-y text-slate-600"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-xl border border-blue-100 h-fit sticky top-24">
                    <h3 class="font-bold mb-6 text-slate-400 uppercase text-xs">Checkout Summary</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500"><span>Subtotal</span><span id="subTotal">₹0.00</span></div>
                        <div class="flex justify-between items-center">
                            <span class="font-bold">Discount (%)</span>
                            <input type="number" id="billDiscount" value="0" class="w-20 p-2 border rounded-lg text-right font-bold text-blue-600" oninput="calcBill()">
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t">
                            <span class="font-black text-slate-800">Final Bill (₹)</span>
                            <input type="number" id="editableGrandTotal" class="w-28 p-2 bg-blue-50 border-2 border-blue-200 rounded-lg text-right font-black text-blue-700 text-xl" oninput="syncToTablet()">
                        </div>
                    </div>
                    <div class="flex p-1 bg-gray-100 rounded-xl mb-6">
                        <button onclick="setMode('CASH')" id="btnCash" class="flex-1 py-3 rounded-lg font-bold bg-white shadow transition">CASH</button>
                        <button onclick="setMode('UPI')" id="btnUpi" class="flex-1 py-3 rounded-lg font-bold text-slate-500 transition">UPI</button>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-700 active:scale-95 transition">FINISH & CLEAR</button>
                </div>
            </div>
        </div>

        <div id="inventory" class="tab-content hidden space-y-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 id="formTitle" class="text-xl font-black mb-6 text-slate-800 uppercase tracking-tight">Manage Inventory</h2>
                <form id="stockForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <input type="hidden" id="editIdx" value="-1">
                    <input type="text" id="invBarcode" placeholder="Barcode" class="p-3 border rounded-xl bg-slate-50" required>
                    <input type="text" id="invName" placeholder="Medicine Name" class="p-3 border rounded-xl" required>
                    <input type="date" id="invExpiry" class="p-3 border rounded-xl" required>
                    <input type="number" id="invQty" placeholder="Qty" class="p-3 border rounded-xl" required>
                    <input type="number" id="invSale" placeholder="MRP" class="p-3 border rounded-xl" required>
                    <button type="submit" id="saveBtn" class="bg-blue-600 text-white p-3 rounded-xl font-bold">SAVE STOCK</button>
                </form>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-xs uppercase">
                        <tr><th class="p-4">Barcode</th><th class="p-4">Name</th><th class="p-4">Expiry</th><th class="p-4">Stock</th><th class="p-4">MRP</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="inventoryList" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ph_inv')) || [];
        let salesHistory = JSON.parse(localStorage.getItem('ph_sales')) || [];
        let cart = [];
        let paymentMode = "CASH";
        let syncPin = localStorage.getItem('ph_pin') || Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('ph_pin', syncPin);

        const peer = new Peer('pharma-moranhat-' + syncPin);
        let tabletConn = null;

        peer.on('open', id => document.getElementById('pinDisplay').innerText = syncPin);
        
        peer.on('connection', conn => { 
            tabletConn = conn; 
            syncToTablet(); 
            conn.on('data', data => {
                if(data.command === 'COMPLETE_SALE') completeSale();
            });
        });

        function syncToTablet(type = 'UPDATE') {
            if (tabletConn && tabletConn.open) {
                const totalVal = document.getElementById('editableGrandTotal').value;
                tabletConn.send({ type, cart, total: "₹" + totalVal, mode: paymentMode });
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'inventory') renderInventoryList();
            if(id === 'billing') updateSalesTable();
        }

        document.getElementById('stockForm').onsubmit = function(e) {
            e.preventDefault();
            const idx = parseInt(document.getElementById('editIdx').value);
            const newItem = {
                barcode: document.getElementById('invBarcode').value,
                name: document.getElementById('invName').value,
                expiry: document.getElementById('invExpiry').value,
                qty: parseInt(document.getElementById('invQty').value),
                sale: parseFloat(document.getElementById('invSale').value)
            };
            if(idx === -1) inventory.push(newItem); else inventory[idx] = newItem;
            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            this.reset();
            document.getElementById('editIdx').value = "-1";
            renderInventoryList();
        };

        function renderInventoryList() {
            document.getElementById('inventoryList').innerHTML = inventory.map((item, idx) => `
                <tr class="hover:bg-slate-50"><td class="p-4 font-mono text-xs">${item.barcode}</td><td class="p-4 font-bold">${item.name}</td><td class="p-4">${item.expiry}</td><td class="p-4 font-bold">${item.qty}</td><td class="p-4 font-bold text-blue-600">₹${item.sale}</td><td class="p-4"><button onclick="editItem(${idx})" class="text-blue-600 font-bold hover:underline">Edit</button></td></tr>
            `).join('');
        }

        function editItem(idx) {
            const item = inventory[idx];
            document.getElementById('invBarcode').value = item.barcode;
            document.getElementById('invName').value = item.name;
            document.getElementById('invExpiry').value = item.expiry;
            document.getElementById('invQty').value = item.qty;
            document.getElementById('invSale').value = item.sale;
            document.getElementById('editIdx').value = idx;
            showTab('inventory');
        }

        function handleBillSearch(e) {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase();
                const prod = inventory.find(p => p.barcode === val || p.name.toLowerCase().includes(val));
                if(prod) { cart.push({...prod, cartQty: 1}); renderCart(); e.target.value = ''; }
            }
        }

        function renderCart() {
            document.getElementById('billItems').innerHTML = cart.map((item, idx) => `
                <tr class="font-bold border-b">
                    <td class="p-4">${item.name}</td>
                    <td class="p-4 text-center"><input type="number" value="${item.cartQty}" class="w-12 border rounded text-center" onchange="updateQty(${idx}, this.value)"></td>
                    <td class="p-4">₹${item.sale}</td>
                    <td class="p-4 text-blue-600">₹${(item.sale * item.cartQty).toFixed(2)}</td>
                    <td class="p-4 text-right"><button onclick="removeItem(${idx})" class="text-red-300">✕</button></td>
                </tr>
            `).join('');
            calcBill();
        }

        function updateQty(idx, val) { cart[idx].cartQty = parseInt(val); renderCart(); }
        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }

        function calcBill() {
            let sub = cart.reduce((acc, i) => acc + (i.sale * i.cartQty), 0);
            let disc = parseFloat(document.getElementById('billDiscount').value) || 0;
            let grand = sub - (sub * (disc/100));
            document.getElementById('subTotal').innerText = `₹${sub.toFixed(2)}`;
            document.getElementById('editableGrandTotal').value = grand.toFixed(2);
            syncToTablet();
        }

        function setMode(mode) {
            paymentMode = mode;
            document.getElementById('btnCash').className = mode === 'CASH' ? 'flex-1 py-3 rounded-lg font-bold bg-white shadow' : 'flex-1 py-3 rounded-lg font-bold text-slate-500';
            document.getElementById('btnUpi').className = mode === 'UPI' ? 'flex-1 py-3 rounded-lg font-bold bg-white shadow' : 'flex-1 py-3 rounded-lg font-bold text-slate-500';
            syncToTablet();
        }

        function completeSale() {
            if(cart.length === 0) return;
            const finalAmt = parseFloat(document.getElementById('editableGrandTotal').value);
            const saleRecord = {
                id: Date.now(),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                date: new Date().toLocaleDateString(),
                summary: cart.map(i => `${i.name}(${i.cartQty})`).join(', '),
                amount: finalAmt
            };
            salesHistory.unshift(saleRecord);
            cart.forEach(c => {
                let item = inventory.find(i => i.barcode === c.barcode);
                if(item) item.qty -= c.cartQty;
            });
            localStorage.setItem('ph_inv', JSON.stringify(inventory));
            localStorage.setItem('ph_sales', JSON.stringify(salesHistory));
            
            // SOFT RESET INSTEAD OF RELOAD
            syncToTablet('CLEAR'); // Tell tablet to clear screen
            cart = [];
            document.getElementById('billDiscount').value = 0;
            renderCart();
            updateSalesTable();
            document.getElementById('billSearch').focus();
        }

        function updateSalesTable() {
            const today = new Date().toLocaleDateString();
            const todaySales = salesHistory.filter(s => s.date === today);
            document.getElementById('todayRev').innerText = "₹" + todaySales.reduce((acc, s) => acc + s.amount, 0).toFixed(2);
            document.getElementById('salesHistoryList').innerHTML = todaySales.map(s => `
                <tr class="border-b"><td class="p-3">${s.time}</td><td class="p-3 text-left truncate max-w-xs">${s.summary}</td><td class="p-3 font-bold text-blue-600">₹${s.amount}</td><td class="p-3 flex justify-center gap-2"><button onclick="editPastSale(${s.id})" class="text-blue-500 hover:underline text-xs">Edit</button><button onclick="deleteSale(${s.id})" class="text-red-400 hover:underline text-xs">Del</button></td></tr>
            `).join('');
        }

        function deleteSale(id) { if(confirm("Delete this sale?")) { salesHistory = salesHistory.filter(s => s.id !== id); localStorage.setItem('ph_sales', JSON.stringify(salesHistory)); updateSalesTable(); } }
        function editPastSale(id) { 
            const s = salesHistory.find(x => x.id === id);
            const n = prompt("Enter new amount:", s.amount);
            if(n) { s.amount = parseFloat(n); localStorage.setItem('ph_sales', JSON.stringify(salesHistory)); updateSalesTable(); }
        }
        updateSalesTable();
    </script>
</body>
</html>
