<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-blue-50 h-screen flex flex-col items-center justify-center p-6">
    <div id="pairing" class="bg-white p-10 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold mb-4">Connect to Billing</h1>
        <input type="number" id="pin" placeholder="Enter PIN" class="text-4xl w-48 text-center border-b-4 border-blue-600 mb-6 outline-none">
        <button onclick="connect()" class="block w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-xl">LINK NOW</button>
    </div>

    <div id="display" class="hidden w-full h-full flex gap-6">
        <div class="w-1/2 bg-white rounded-3xl p-8 shadow-lg overflow-y-auto">
            <h2 class="text-2xl font-bold border-b pb-4 mb-4">Your Bill Items</h2>
            <div id="items" class="space-y-4"></div>
        </div>
        <div class="w-1/2 flex flex-col justify-center items-center bg-white rounded-3xl shadow-lg p-10">
            <h3 class="text-gray-400 text-2xl font-bold">Payable Amount</h3>
            <div id="total" class="text-8xl font-black text-blue-700 my-6">₹0</div>
            <div id="qr-container" class="hidden bg-white p-4 border-4 border-green-500 rounded-2xl shadow-xl">
                <div id="qrcode"></div>
                <p class="text-xs text-center mt-2 font-bold uppercase">vyapar.172721135496@hdfcbank</p>
            </div>
            <div id="cash-msg" class="hidden bg-yellow-50 p-8 rounded-2xl border-2 border-yellow-200 text-center">
                <p class="text-4xl">💵</p>
                <p class="text-xl font-bold text-gray-700">Please pay at the counter</p>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        function connect() {
            const pin = document.getElementById('pin').value;
            conn = peer.connect('pharma-moranhat-' + pin);
            conn.on('open', () => {
                document.getElementById('pairing').remove();
                document.getElementById('display').classList.remove('hidden');
                document.getElementById('display').classList.add('flex');
            });
            conn.on('data', data => {
                document.getElementById('items').innerHTML = data.cart.map(i => `<div class="flex justify-between text-2xl border-b pb-2"><span>${i.name}</span><b>₹${i.sale}</b></div>`).join('');
                document.getElementById('total').innerText = data.total;
                
                const val = parseFloat(data.total.replace('₹',''));
                document.getElementById('qr-container').classList.add('hidden');
                document.getElementById('cash-msg').classList.add('hidden');

                if(val > 0) {
                    if(data.mode === 'UPI') {
                        document.getElementById('qr-container').classList.remove('hidden');
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById('qrcode'), {
                            text: `upi://pay?pa=vyapar.172721135496@hdfcbank&pn=Pharmacy&am=${val}&cu=INR`,
                            width: 250, height: 250
                        });
                    } else {
                        document.getElementById('cash-msg').classList.remove('hidden');
                    }
                }
            });
        }
    </script>
</body>
</html>
