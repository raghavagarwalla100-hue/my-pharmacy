<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding-top: 10vh; }
        .container { background: white; color: black; display: inline-block; padding: 30px; border-radius: 20px; }
        .price { font-size: 4rem; font-weight: bold; color: #10b981; margin: 20px 0; }
        h1 { font-size: 2rem; }
    </style>
</head>
<body>

    <h1>SCAN TO PAY</h1>
    <div class="container">
        <div id="qrcode"></div>
        <div class="price" id="amtDisplay">₹0.00</div>
    </div>
    <p style="margin-top: 20px; color: #888;">Pharmacy Digital Billing System</p>

<script>
    // 1. Get the price from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const total = urlParams.get('total') || "0.00";
    
    document.getElementById('amtDisplay').innerText = "₹" + total;

    // 2. Generate UPI QR Code (Change 'YOURNAME@upi' to your actual UPI ID)
    const upiID = "YOURNAME@upi"; 
    const upiLink = `upi://pay?pa=${upiID}&pn=Pharmacy&am=${total}&cu=INR`;

    new QRCode(document.getElementById("qrcode"), {
        text: upiLink,
        width: 300,
        height: 300
    });
</script>
</body>
</html>
