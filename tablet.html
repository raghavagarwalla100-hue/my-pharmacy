<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaGenius - Tablet Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center p-4">
    
    <div id="pairing" class="bg-white p-12 rounded-[40px] shadow-2xl text-center max-w-md w-full">
        <h1 class="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Link Tablet</h1>
        <input type="number" id="pin" placeholder="0000" class="text-6xl w-full text-center font-black border-b-8 border-blue-600 mb-10 outline-none text-blue-600 pb-2">
        <button onclick="connect()" class="block w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all">CONNECT</button>
    </div>

    <div id="display" class="hidden w-full h-full max-w-7xl gap-8">
        <div class="w-5/12 bg-white rounded-[50px] p-10 shadow-2xl flex flex-col">
            <h2 class="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Medicine List</h2>
            <div id="items" class="space-y-4 overflow-y-auto flex-grow pr-4"></div>
            <div id="whatsapp-area" class="mt-8 p-6 bg-green-50 rounded-[35px] border-2 border-green-200 opacity-20 pointer-events-none transition-all">
                <p class="font-black text-green-800 uppercase text-xs mb-3 tracking-widest">Get Digital Bill</p>
                <div class="flex gap-3">
                    <input type="number" id="custPhone" placeholder="Mobile Number" class="flex-grow p-4 rounded-2xl border-none shadow-inner text-xl font-bold">
                    <button onclick="sendWhatsApp()" class="bg-green-600 text-white px-6 rounded-2xl font-black">SEND</button>
                </div>
            </div>
        </div>

        <div class="w-7/12 flex flex-col justify-center items-center bg-blue-600 rounded-[50px] shadow-2xl p-12 text-white text-center">
            <p class="text-blue-200 text-2xl font-bold uppercase tracking-widest mb-4">Total Amount</p>
            <div id="total" class="text-[12rem] font-black leading-none mb-12 tracking-tighter drop-shadow-lg">₹0</div>
            
            <div id="qr-container" class="hidden bg-white p-8 rounded-[40px] shadow-2xl">
                <div id="qrcode"></div>
                <p class="text-slate-800 font-black mt-4 text-xs uppercase tracking-tighter">vyapar.172721135496@hdfcbank</p>
            </div>

            <button id="cash-btn" onclick="triggerHandover()" class="hidden bg-yellow-400 hover:bg-yellow-300 text-blue-900 px-12 py-10 rounded-[40px] border-8 border-blue-700 font-black text-4xl uppercase shadow-2xl transform active:scale-90 transition-all">
                Hand Over Cash 💵
            </button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        let lastBillData = null;

        function connect() {
            const pin = document.getElementById('pin').value;
            conn = peer.connect('pharma-moranhat-' + pin);
            conn.on('open', () => {
                document.getElementById('pairing').classList.add('hidden');
                document.getElementById('display').classList.remove('hidden');
                document.getElementById('display').classList.add('flex');
            });

            conn.on('data', data => {
                if(data.type === 'REFRESH') { location.reload(); return; }
                lastBillData = data;
                document.getElementById('items').innerHTML = data.cart.map(i => `
                    <div class="flex justify-between items-center bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <div><p class="text-2xl font-black text-slate-800">${i.name}</p><p class="text-sm font-bold text-slate-400 uppercase">Qty: ${i.cartQty}</p></div>
                        <b class="text-3xl text-blue-600 font-black tracking-tighter">₹${(i.sale * i.cartQty).toFixed(2)}</b>
                    </div>
                `).join('');
                document.getElementById('whatsapp-area').classList.toggle('opacity-20', data.cart.length === 0);
                document.getElementById('whatsapp-area').classList.toggle('pointer-events-none', data.cart.length === 0);
                document.getElementById('total').innerText = data.total;
                const val = parseFloat(data.total.replace('₹',''));
                document.getElementById('qr-container').classList.add('hidden');
                document.getElementById('cash-btn').classList.add('hidden');
                if(val > 0) {
                    if(data.mode === 'UPI') {
                        document.getElementById('qr-container').classList.remove('hidden');
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById('qrcode'), { text: `upi://pay?pa=vyapar.172721135496@hdfcbank&pn=Pharmacy&am=${val}&cu=INR`, width: 260, height: 260 });
                    } else { document.getElementById('cash-btn').classList.remove('hidden'); }
                }
            });
        }

        function triggerHandover() {
            if (conn && conn.open) {
                document.getElementById('cash-btn').innerText = "SAVING...";
                document.getElementById('cash-btn').disabled = true;
                conn.send({ command: 'COMPLETE_SALE' });
            }
        }

        function sendWhatsApp() {
            const phone = document.getElementById('custPhone').value;
            if(!phone || !lastBillData) return;
            let text = `*PHARMAGENIUS MORANHAT*%0A------------------%0A`;
            lastBillData.cart.forEach(i => { text += `• ${i.name} [x${i.cartQty}] = ₹${(i.sale * i.cartQty).toFixed(2)}%0A`; });
            text += `------------------%0A*TOTAL: ${lastBillData.total}*%0A_Thank you!_`;
            window.open(`https://wa.me/91${phone}?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
